# ─────────────────────────────────────────────────────────────────────────────
# rew release pipeline
#
# Trigger: push a semver tag, e.g.
#   git tag v0.1.0 && git push origin v0.1.0
#
# What it does:
#   1. Runs full test suite (test-all.sh)
#   2. Builds the Tauri app for macOS (arm64 + x86_64)
#   3. Creates a GitHub Release with the tag name as title
#   4. Uploads the .dmg as a release asset (direct download link)
#
# The download URL will be stable and predictable:
#   https://github.com/kuqili/rew/releases/download/vX.Y.Z/rew_X.Y.Z_aarch64.dmg
#   https://github.com/kuqili/rew/releases/download/vX.Y.Z/rew_X.Y.Z_x64.dmg
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v0.1.0, v1.0.0-beta.1, etc.

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── Test gate: block release if tests fail ────────────────────
  test:
    name: Run Tests
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      # Tauri's build-script and generate_context!() macro check at compile
      # time that bundled resources and frontendDist exist. Create stubs so
      # `cargo check/test --workspace` can compile the rew-tauri crate.
      - name: Prepare Tauri build stubs
        run: |
          mkdir -p gui/dist && echo '<html></html>' > gui/dist/index.html
          cargo build --release -p rew-cli
          cp target/release/rew src-tauri/rew

      - name: Run test suite
        run: chmod +x ./scripts/test-all.sh && ./scripts/test-all.sh

  # ── Build macOS DMG (arm64 + x64) ────────────────────────────
  build-macos:
    name: Build macOS DMG (${{ matrix.arch_label }})
    needs: test
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin    # Apple Silicon
            arch_label: arm64
          - target: x86_64-apple-darwin     # Intel
            arch_label: x64

    steps:
      # ── Checkout ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Sync version from git tag ─────────────────────────────
      # Tauri uses the version in tauri.conf.json / Cargo.toml to name
      # the DMG (e.g. rew_0.1.2_aarch64.dmg). Without this step the
      # filename would always contain the stale version hardcoded in
      # those files, causing 404s on the download page.
      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "📌 Syncing version to $VERSION"

          # tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

          # src-tauri/Cargo.toml (first version = line under [package])
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

          echo "✅ tauri.conf.json version: $(jq -r .version src-tauri/tauri.conf.json)"
          echo "✅ Cargo.toml version: $(grep '^version' src-tauri/Cargo.toml | head -1)"

      # ── Rust toolchain ──────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      # ── Node / pnpm ─────────────────────────────────────────────
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Install root dependencies (tauri CLI)
        run: pnpm install

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: gui

      # ── Build CLI binary for target architecture ─────────────────
      # Must be done before tauri-action because the CLI binary is
      # bundled as a resource inside the .app. Cross-compiling ensures
      # the binary matches the target arch (arm64 or x64).
      - name: Build rew CLI for ${{ matrix.target }}
        run: |
          cargo build --release -p rew-cli --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/rew src-tauri/rew

      # ── Import Developer ID certificate ────────────────────────
      - name: Import code signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # ── Place API key for notarization ──────────────────────────
      - name: Place notarization API key
        run: |
          mkdir -p ~/.private_keys
          echo "${{ secrets.APPLE_API_KEY_CONTENT }}" > ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 ~/.private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      # ── Build Tauri app (.dmg) ──────────────────────────────────
      - name: Build Tauri app (.dmg)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'rew ${{ github.ref_name }}'
          releaseBody: |
            ## rew ${{ github.ref_name }}

            ### 下载
            - **Apple Silicon (M1/M2/M3/M4)**：下载 `rew_*_aarch64.dmg`
            - **Intel Mac**：下载 `rew_*_x64.dmg`

          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target ${{ matrix.target }}

      # ── Re-sign CLI binary inside .app + notarize + staple ──────
      - name: Sign CLI binary, notarize and staple
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET=${{ matrix.target }}
          APP_PATH="target/${TARGET}/release/bundle/macos/rew.app"
          DMG_PATH=$(ls target/${TARGET}/release/bundle/dmg/rew_*.dmg | head -1)

          echo "✍️ Re-sign CLI binary inside .app..."
          codesign --force \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements src-tauri/entitlements.plist \
            "$APP_PATH/Contents/Resources/rew"

          echo "✍️ Re-sign .app..."
          codesign --force \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements src-tauri/entitlements.plist \
            "$APP_PATH"

          echo "📦 Rebuild DMG with re-signed .app..."
          rm -f "$DMG_PATH"
          hdiutil create \
            -volname "rew" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "$DMG_PATH"

          echo "✍️ Sign DMG..."
          codesign --force \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            "$DMG_PATH"

          echo "🔏 Notarize DMG..."
          xcrun notarytool submit "$DMG_PATH" \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait

          echo "📎 Staple .app and DMG..."
          xcrun stapler staple "$APP_PATH"
          xcrun stapler staple "$DMG_PATH"

          echo "🔍 Verify..."
          spctl --assess --type exec --verbose "$APP_PATH"
          spctl --assess --type install --verbose "$DMG_PATH" 2>&1 || true

          echo "⬆️ Replace Release asset with notarized DMG..."
          gh release upload "${{ github.ref_name }}" "$DMG_PATH" --clobber
