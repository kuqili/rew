<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1020" viewBox="0 0 1200 1020">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1890FF"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FA8C16"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#595959"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#52C41A"/>
    </marker>
    <style>text { font-family: "PingFang SC","Microsoft YaHei",Arial,sans-serif; }</style>
  </defs>

  <!-- 整体虚线框 -->
  <rect x="15" y="10" width="1170" height="1000" rx="8" fill="none" stroke="#8C8C8C" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- 标题 -->
  <text x="600" y="46" text-anchor="middle" font-size="22" font-weight="bold" fill="#1890FF">rew 完整系统架构图</text>

  <!-- ══════════════ 第一层：AI 工具 + 用户 ══════════════ -->
  <rect x="40" y="58" width="1130" height="86" rx="6" fill="#E6F7FF" stroke="#1890FF" stroke-width="0.5"/>
  <text x="58" y="76" font-size="11" fill="#1890FF">用户 &amp; AI 工具层</text>

  <rect x="65"  y="83" width="115" height="38" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="122" y="106" text-anchor="middle" font-size="12" fill="#262626">Claude Code</text>

  <rect x="195" y="83" width="100" height="38" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="245" y="106" text-anchor="middle" font-size="12" fill="#262626">Cursor</text>

  <rect x="310" y="83" width="110" height="38" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="365" y="106" text-anchor="middle" font-size="12" fill="#262626">WorkBuddy</text>

  <rect x="435" y="83" width="110" height="38" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="490" y="106" text-anchor="middle" font-size="12" fill="#262626">CodeBuddy</text>

  <rect x="590" y="83" width="130" height="38" rx="4" fill="#FFF7E6" stroke="#FAAD14" stroke-width="0.5"/>
  <text x="655" y="100" text-anchor="middle" font-size="11" fill="#262626">其他 AI 工具</text>
  <text x="655" y="114" text-anchor="middle" font-size="10" fill="#8C8C8C">无 Hook 支持</text>

  <rect x="760" y="83" width="120" height="38" rx="20" fill="#F6FFED" stroke="#52C41A" stroke-width="0.5"/>
  <text x="820" y="106" text-anchor="middle" font-size="12" fill="#262626">用户操作文件</text>

  <!-- 标注文字 -->
  <text x="300" y="158" text-anchor="middle" font-size="10" fill="#1890FF">Hook 注入（rew install）</text>
  <text x="655" y="158" text-anchor="middle" font-size="10" fill="#FAAD14">文件系统事件</text>
  <text x="820" y="158" text-anchor="middle" font-size="10" fill="#52C41A">文件系统事件</text>

  <!-- 用户层往下箭头 -->
  <line x1="122" y1="121" x2="122" y2="173" stroke="#1890FF" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="245" y1="121" x2="245" y2="173" stroke="#1890FF" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="365" y1="121" x2="365" y2="173" stroke="#1890FF" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="490" y1="121" x2="490" y2="173" stroke="#1890FF" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="655" y1="121" x2="655" y2="173" stroke="#FAAD14" stroke-width="1" marker-end="url(#arr-orange)"/>
  <line x1="820" y1="121" x2="820" y2="173" stroke="#52C41A" stroke-width="1" marker-end="url(#arr-green)"/>

  <!-- ══════════════ 第二层：双引擎 ══════════════ -->
  <rect x="40" y="177" width="1130" height="78" rx="6" fill="#F0F5FF" stroke="#91D5FF" stroke-width="0.5"/>
  <text x="58" y="195" font-size="11" fill="#4169E1">双引擎保护层</text>

  <rect x="60"  y="200" width="480" height="42" rx="4" fill="#FFF" stroke="#1890FF" stroke-width="0.5"/>
  <text x="300" y="218" text-anchor="middle" font-size="12" fill="#1890FF">Hook 引擎（精确层）</text>
  <text x="300" y="233" text-anchor="middle" font-size="10" fill="#595959">rew hook CLI  →  写入 Hook Spool（磁盘文件队列）</text>

  <rect x="600" y="200" width="450" height="42" rx="4" fill="#FFF" stroke="#FAAD14" stroke-width="0.5"/>
  <text x="825" y="218" text-anchor="middle" font-size="12" fill="#FA8C16">FSEvents 引擎（兜底层）</text>
  <text x="825" y="233" text-anchor="middle" font-size="10" fill="#595959">MacOSWatcher  →  Shadow 备份（文件存对象存储 + .shadow_hashes 映射）</text>

  <!-- 引擎层往下 -->
  <line x1="300" y1="242" x2="300" y2="272" stroke="#1890FF" stroke-width="1" marker-end="url(#arr-blue)"/>
  <line x1="825" y1="242" x2="825" y2="272" stroke="#FA8C16" stroke-width="1" marker-end="url(#arr-orange)"/>

  <!-- ══════════════ 第三层：两列独立处理区 ══════════════ -->
  <!-- 整体背景 -->
  <rect x="40" y="276" width="1130" height="296" rx="6" fill="#F5FAFF" stroke="#BAE7FF" stroke-width="0.5"/>
  <text x="58" y="294" font-size="11" fill="#4169E1">独立处理区（两条路径各自逻辑）</text>

  <!-- 左列：Hook路径 -->
  <rect x="55" y="302" width="510" height="254" rx="5" fill="none" stroke="#91D5FF" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="310" y="318" text-anchor="middle" font-size="11" fill="#1890FF">● Hook 路径（精确）</text>

  <!-- H1 Spool状态机 -->
  <rect x="68" y="325" width="484" height="40" rx="3" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="310" y="341" text-anchor="middle" font-size="11" fill="#262626">Spool 状态机</text>
  <text x="310" y="355" text-anchor="middle" font-size="10" fill="#595959">pending → processing → done / failed  |  崩溃 requeue  |  幂等 receipt 去重</text>

  <line x1="310" y1="365" x2="310" y2="380" stroke="#1890FF" stroke-width="0.8" marker-end="url(#arr-blue)"/>

  <!-- H2 Hook Event Writer -->
  <rect x="68" y="380" width="484" height="38" rx="3" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="310" y="396" text-anchor="middle" font-size="11" fill="#262626">Hook Event Writer（独立线程）</text>
  <text x="310" y="410" text-anchor="middle" font-size="10" fill="#595959">claim → 重试机制（250ms / 1s）→ process_hook_event → mark done/failed</text>

  <line x1="310" y1="418" x2="310" y2="433" stroke="#1890FF" stroke-width="0.8" marker-end="url(#arr-blue)"/>

  <!-- H3 process_hook_event -->
  <rect x="68" y="433" width="484" height="50" rx="3" fill="#E6F7FF" stroke="#1890FF" stroke-width="0.5"/>
  <text x="310" y="450" text-anchor="middle" font-size="11" fill="#1890FF">process_hook_event</text>
  <text x="185" y="465" text-anchor="middle" font-size="10" fill="#595959">PromptStarted</text>
  <text x="310" y="465" text-anchor="middle" font-size="10" fill="#595959">PostToolObserved</text>
  <text x="435" y="465" text-anchor="middle" font-size="10" fill="#595959">TaskStopRequested</text>
  <text x="310" y="477" text-anchor="middle" font-size="10" fill="#595959">→ 创建 / 更新 Task 记录  →  enqueue 任务终态 job</text>

  <!-- H路径往下到公共区分叉线（先画，z-order靠前） -->
  <line x1="310" y1="483" x2="310" y2="528" stroke="#1890FF" stroke-width="1" marker-end="url(#arr-blue)"/>

  <!-- H4 任务级 Change 写入（Hook独有）-->
  <rect x="68" y="490" width="484" height="32" rx="3" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="310" y="507" text-anchor="middle" font-size="11" fill="#262626">Hook Change 写入（per PostToolObserved）</text>
  <text x="310" y="519" text-anchor="middle" font-size="10" fill="#595959">old_hash / new_hash / change_type / lines_added / lines_removed</text>

  <!-- 右列：FSEvents路径 -->
  <rect x="620" y="302" width="535" height="254" rx="5" fill="none" stroke="#FFD591" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="887" y="318" text-anchor="middle" font-size="11" fill="#FA8C16">● FSEvents 路径（兜底）</text>

  <!-- F1 EventProcessor -->
  <rect x="633" y="325" width="509" height="50" rx="3" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="887" y="342" text-anchor="middle" font-size="11" fill="#262626">EventProcessor（3s 滑动窗口）</text>
  <text x="887" y="356" text-anchor="middle" font-size="10" fill="#595959">同路径去重，保留最后状态  |  merge_kind：Created+Deleted=净零 / Deleted+Created=Modified</text>
  <text x="887" y="368" text-anchor="middle" font-size="10" fill="#595959">Dynamic Pause：package.json/Cargo.toml 变化 → 暂停 node_modules/target 60s</text>

  <line x1="887" y1="375" x2="887" y2="390" stroke="#FA8C16" stroke-width="0.8" marker-end="url(#arr-orange)"/>

  <!-- F2 Daemon 消费 -->
  <rect x="633" y="390" width="509" height="50" rx="3" fill="#FFF7E6" stroke="#FAAD14" stroke-width="0.5"/>
  <text x="887" y="407" text-anchor="middle" font-size="11" fill="#FA8C16">Daemon 消费 EventBatch</text>
  <text x="887" y="421" text-anchor="middle" font-size="10" fill="#595959">BackupEngine：APFS clonefile 备份 / shadow hash 查找 old_hash</text>
  <text x="887" y="433" text-anchor="middle" font-size="10" fill="#595959">RuleEngine + AnomalyDetector → 异常告警 → 系统通知</text>

  <line x1="887" y1="440" x2="887" y2="455" stroke="#FA8C16" stroke-width="0.8" marker-end="url(#arr-orange)"/>

  <!-- F3 FSEvent Change 写入 -->
  <rect x="633" y="455" width="509" height="32" rx="3" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="887" y="472" text-anchor="middle" font-size="11" fill="#262626">FSEvent Change 写入（10min 监听窗口归档）</text>
  <text x="887" y="484" text-anchor="middle" font-size="10" fill="#595959">attribution=fsevent_active / fsevent_grace</text>

  <!-- ══════════════ 汇聚标注 ══════════════ -->
  <!-- 汇聚横线 -->
  <line x1="310" y1="528" x2="310" y2="580" stroke="#1890FF" stroke-width="1"/>
  <line x1="887" y1="490" x2="887" y2="580" stroke="#FA8C16" stroke-width="1"/>
  <line x1="310" y1="580" x2="887" y2="580" stroke="#595959" stroke-width="1"/>
  <line x1="600" y1="580" x2="600" y2="610" stroke="#595959" stroke-width="1" marker-end="url(#arr-gray)"/>

  <!-- 汇聚标注文字 -->
  <rect x="480" y="555" width="240" height="22" rx="3" fill="#FFFBE6" stroke="#FAAD14" stroke-width="0.5"/>
  <text x="600" y="570" text-anchor="middle" font-size="11" fill="#D46B08">两条路径汇聚 → 公共处理步骤</text>

  <!-- ══════════════ 第四层：公共处理区 ══════════════ -->
  <rect x="40" y="614" width="1130" height="168" rx="6" fill="#F0FFF4" stroke="#95DE64" stroke-width="0.8"/>
  <text x="58" y="632" font-size="11" fill="#389E0D">公共处理区（Hook 路径 &amp; FSEvents 路径均经过）</text>

  <!-- C1 PathFilter -->
  <rect x="58" y="640" width="220" height="46" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="168" y="657" text-anchor="middle" font-size="11" fill="#262626">PathFilter（3层过滤）</text>
  <text x="168" y="671" text-anchor="middle" font-size="10" fill="#595959">glob / 文件名 / 目录组件</text>
  <text x="168" y="681" text-anchor="middle" font-size="10" fill="#595959">node_modules/.git/target 排除</text>

  <!-- C2 Baseline 解析 -->
  <rect x="298" y="640" width="260" height="46" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="428" y="657" text-anchor="middle" font-size="11" fill="#262626">Baseline 解析（获取变更前状态）</text>
  <text x="428" y="671" text-anchor="middle" font-size="10" fill="#595959">Pre-tool Hash Store → File Index</text>
  <text x="428" y="681" text-anchor="middle" font-size="10" fill="#595959">→ Shadow Hash → old_hash 确定</text>

  <!-- C3 File Index 同步 -->
  <rect x="578" y="640" width="210" height="46" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="683" y="657" text-anchor="middle" font-size="11" fill="#262626">File Index 同步</text>
  <text x="683" y="671" text-anchor="middle" font-size="10" fill="#595959">sync_file_index_after_change</text>
  <text x="683" y="681" text-anchor="middle" font-size="10" fill="#595959">维护文件存活状态快照</text>

  <!-- C4 Reconcile -->
  <rect x="808" y="640" width="340" height="46" rx="4" fill="#F6FFED" stroke="#52C41A" stroke-width="0.5"/>
  <text x="978" y="657" text-anchor="middle" font-size="11" fill="#389E0D">Task Finalization（Reconcile + 统计）</text>
  <text x="978" y="671" text-anchor="middle" font-size="10" fill="#595959">净零移除 / 类型修正 / Rename 配对（Deleted+Created 哈希配对）</text>
  <text x="978" y="681" text-anchor="middle" font-size="10" fill="#595959">refresh_rollup → 生成 AI Summary → finalize_task_stats</text>

  <!-- 公共区内部箭头 -->
  <line x1="278" y1="663" x2="296" y2="663" stroke="#595959" stroke-width="0.5" marker-end="url(#arr-gray)"/>
  <line x1="558" y1="663" x2="576" y2="663" stroke="#595959" stroke-width="0.5" marker-end="url(#arr-gray)"/>
  <line x1="788" y1="663" x2="806" y2="663" stroke="#595959" stroke-width="0.5" marker-end="url(#arr-gray)"/>

  <!-- 公共区往下 -->
  <line x1="600" y1="686" x2="600" y2="718" stroke="#595959" stroke-width="0.5" marker-end="url(#arr-gray)"/>

  <!-- ══════════════ 第五层：存储层 ══════════════ -->
  <rect x="40" y="722" width="1130" height="94" rx="6" fill="#F0F5FF" stroke="#ADC6FF" stroke-width="0.5"/>
  <text x="58" y="740" font-size="11" fill="#4169E1">存储层</text>

  <!-- 对象存储 圆柱 -->
  <ellipse cx="165" cy="756" rx="95" ry="5" fill="#F0F5FF" stroke="#91D5FF" stroke-width="0.5"/>
  <rect x="70" y="756" width="190" height="40" fill="#F0F5FF" stroke="none"/>
  <line x1="70" y1="756" x2="70" y2="796" stroke="#91D5FF" stroke-width="0.5"/>
  <line x1="260" y1="756" x2="260" y2="796" stroke="#91D5FF" stroke-width="0.5"/>
  <ellipse cx="165" cy="796" rx="95" ry="5" fill="#F0F5FF" stroke="#91D5FF" stroke-width="0.5"/>
  <text x="165" y="773" text-anchor="middle" font-size="11" fill="#262626">对象存储</text>
  <text x="165" y="787" text-anchor="middle" font-size="10" fill="#595959">SHA-256 内容寻址 / APFS CoW</text>

  <!-- SQLite 圆柱 -->
  <ellipse cx="395" cy="756" rx="95" ry="5" fill="#F0F5FF" stroke="#91D5FF" stroke-width="0.5"/>
  <rect x="300" y="756" width="190" height="40" fill="#F0F5FF" stroke="none"/>
  <line x1="300" y1="756" x2="300" y2="796" stroke="#91D5FF" stroke-width="0.5"/>
  <line x1="490" y1="756" x2="490" y2="796" stroke="#91D5FF" stroke-width="0.5"/>
  <ellipse cx="395" cy="796" rx="95" ry="5" fill="#F0F5FF" stroke="#91D5FF" stroke-width="0.5"/>
  <text x="395" y="773" text-anchor="middle" font-size="11" fill="#262626">SQLite 数据库</text>
  <text x="395" y="787" text-anchor="middle" font-size="10" fill="#595959">Task / Change / File Index / Receipt</text>

  <!-- Pre-tool Hash Store -->
  <rect x="530" y="748" width="175" height="48" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="617" y="768" text-anchor="middle" font-size="11" fill="#262626">Pre-tool Hash Store</text>
  <text x="617" y="782" text-anchor="middle" font-size="10" fill="#595959">session_key 级文件基线哈希</text>

  <!-- Shadow Hashes -->
  <rect x="720" y="748" width="160" height="48" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="800" y="768" text-anchor="middle" font-size="11" fill="#262626">Shadow Hash Store</text>
  <text x="800" y="782" text-anchor="middle" font-size="10" fill="#595959">.shadow_hashes/ 即时备份映射</text>

  <!-- config.toml -->
  <rect x="895" y="748" width="155" height="48" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="972" y="768" text-anchor="middle" font-size="11" fill="#262626">config.toml</text>
  <text x="972" y="782" text-anchor="middle" font-size="10" fill="#595959">保护目录 / 清理策略 / 阈值</text>

  <!-- 存储层往下 -->
  <line x1="165" y1="801" x2="165" y2="846" stroke="#595959" stroke-width="0.5" marker-end="url(#arr-gray)"/>
  <line x1="395" y1="801" x2="395" y2="846" stroke="#595959" stroke-width="0.5" marker-end="url(#arr-gray)"/>

  <!-- ══════════════ 第六层：用户交互层 ══════════════ -->
  <rect x="40" y="850" width="1130" height="84" rx="6" fill="#F6FFED" stroke="#B7EB8F" stroke-width="0.5"/>
  <text x="58" y="868" font-size="11" fill="#52C41A">用户交互层</text>

  <rect x="65" y="876" width="240" height="44" rx="4" fill="#FFF" stroke="#52C41A" stroke-width="0.5"/>
  <text x="185" y="895" text-anchor="middle" font-size="12" fill="#262626">桌面 GUI（Tauri + React）</text>
  <text x="185" y="910" text-anchor="middle" font-size="10" fill="#595959">任务时间轴 / Diff / 恢复 / 使用洞察</text>

  <rect x="325" y="876" width="195" height="44" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="422" y="895" text-anchor="middle" font-size="12" fill="#262626">CLI（rew）</text>
  <text x="422" y="910" text-anchor="middle" font-size="10" fill="#595959">install / list / undo / diff / restore</text>

  <rect x="540" y="876" width="195" height="44" rx="4" fill="#FFF7E6" stroke="#FAAD14" stroke-width="0.5"/>
  <text x="637" y="895" text-anchor="middle" font-size="12" fill="#262626">系统通知</text>
  <text x="637" y="910" text-anchor="middle" font-size="10" fill="#595959">异常告警弹窗（批量删除等）</text>

  <rect x="755" y="876" width="175" height="44" rx="4" fill="#FFF" stroke="#8C8C8C" stroke-width="0.5"/>
  <text x="842" y="895" text-anchor="middle" font-size="12" fill="#262626">系统托盘</text>
  <text x="842" y="910" text-anchor="middle" font-size="10" fill="#595959">防护状态 / 暂停恢复</text>

  <!-- ══════════════ 右侧：启动扫描 ══════════════ -->
  <rect x="1000" y="276" width="155" height="110" rx="6" fill="#F9F0FF" stroke="#D3ADF7" stroke-width="0.5"/>
  <text x="1077" y="294" text-anchor="middle" font-size="11" fill="#722ED1">启动时全量扫描</text>
  <rect x="1010" y="302" width="135" height="28" rx="3" fill="#FFF" stroke="#D3ADF7" stroke-width="0.5"/>
  <text x="1077" y="320" text-anchor="middle" font-size="10" fill="#262626">Scanner（增量 Manifest）</text>
  <rect x="1010" y="336" width="135" height="28" rx="3" fill="#FFF" stroke="#D3ADF7" stroke-width="0.5"/>
  <text x="1077" y="354" text-anchor="middle" font-size="10" fill="#262626">File Index 初始化</text>
  <line x1="1077" y1="364" x2="1077" y2="386" stroke="#722ED1" stroke-width="0.8" marker-end="url(#arr-gray)"/>
  <text x="1077" y="382" text-anchor="middle" font-size="10" fill="#722ED1">写入对象存储</text>

  <!-- ══════════════ 图例 ══════════════ -->
  <rect x="1000" y="850" width="155" height="82" rx="4" fill="#FAFAFA" stroke="#D9D9D9" stroke-width="0.5"/>
  <text x="1012" y="868" font-size="11" fill="#595959">图例</text>
